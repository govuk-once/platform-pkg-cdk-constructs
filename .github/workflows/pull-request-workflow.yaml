name: Pull Request Workflow
on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: non-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: Diff-Constructs-Registry

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.14.5

      - name: Initialize Terraform
        working-directory: ./iac
        run: terraform init --backend-config=sandbox.config
        
      - name: Lint Terraform
        working-directory: ./iac
        run: terraform fmt -check

      - name: Run Terraform Plan
        working-directory: ./iac
        run: terraform plan --var-file=sandbox.tfvars -out=tfplan.bin

      - name: Show Terraform Plan
        working-directory: ./iac
        run: terraform show --no-color tfplan.bin >> $GITHUB_STEP_SUMMARY
