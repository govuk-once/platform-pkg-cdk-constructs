name: Terraform PR
on:
  pull_request:
    branches: [main]
    paths:
      - 'iac/**'

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: Diff-Constructs-Registry

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.5

      - name: Initialize Terraform
        working-directory: ./iac
        run: terraform init --backend-config=development.config
        
      - name: Lint Terraform
        working-directory: ./iac
        run: terraform fmt -check

      - name: Run Terraform Plan
        working-directory: ./iac
        run: terraform plan --var-file=development.tfvars -out=tfplan.bin

      - name: Show Terraform Plan
        working-directory: ./iac
        run: echo "\`\`\`"  >> $GITHUB_STEP_SUMMARY && terraform show -no-color tfplan.bin >> $GITHUB_STEP_SUMMARY && echo "\`\`\`"  >> $GITHUB_STEP_SUMMARY
