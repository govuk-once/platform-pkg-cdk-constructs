name: Update Repository (Prod)
on:
  push:
    tags: 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GH-Actions-Deploy-Prod-Constructs

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.5

      - name: Initialize Terraform
        working-directory: ./iac
        run: terraform init --backend-config=prod.config
        
      - name: Run Terraform Plan
        working-directory: ./iac
        run: terraform plan --var-file=prod.tfvars -out=tfplan.bin

      - name: Show Terraform Plan
        working-directory: ./iac
        run: echo "\`\`\`"  >> $GITHUB_STEP_SUMMARY && terraform show -no-color tfplan.bin >> $GITHUB_STEP_SUMMARY && echo "\`\`\`"  >> $GITHUB_STEP_SUMMARY

      - name: Store JSON Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: iac/tfplan.bin
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    environment: prod
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Aws Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GH-Actions-Deploy-Prod-ConstructRepo

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.5

      - name: Initialize Terraform
        working-directory: ./iac
        run: terraform init --backend-config=prod.config

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v5
        with:
          name: terraform-plan
          path: ./iac

      - name: Run Terraform Apply
        working-directory: ./iac
        run: terraform apply tfplan.bin
