name: Spellcheck
on:
  pull_request:
    branches: [main]

jobs:
  spellcheck:
    name: Run Spellchecker
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: "pnpm install"

      - name: Spellcheck
        run: "pnpm run spg"
